name: Release

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: Version bump type (leave empty for auto-detect from commits)
        required: false
        type: choice
        default: default
        options:
          - default
          - patch
          - minor
          - major

jobs:
  release:
    name: Create a new release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write # to be able to push the release commit/tag and publish a GitHub release

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Bun environment
        uses: ./.github/actions/setup-project

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and generate changelog
        run: bunx standard-version ${{ inputs.release-type != 'default' && format('--release-as {0}', inputs.release-type) || '' }}

      - name: Push release commit and tag
        run: git push --follow-tags origin main

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag=$(git describe --tags --abbrev=0)
          gh release create "$tag" --title "$tag" --generate-notes
