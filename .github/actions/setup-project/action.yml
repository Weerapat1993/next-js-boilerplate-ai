name: Setup Bun and dependencies
description: Setup Bun environment with dependencies

inputs:
  bun-version:
    description: Bun version
    required: false
    default: 'latest'
  restore-nextjs-cache:
    description: Whether to restore Next.js build cache
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Restore or cache node_modules
      id: cache-node-modules
      uses: actions/cache@v5
      with:
        path: node_modules
        key: node-modules-${{ inputs.bun-version }}-${{ hashFiles('bun.lock') }}

    - name: Install dependencies
      if: steps.cache-node-modules.outputs.cache-hit != 'true'
      shell: bash
      run: bun install --frozen-lockfile

    - name: Restore Next.js build output
      if: inputs.restore-nextjs-cache == 'true'
      uses: actions/cache/restore@v5
      with:
        path: |
          .next
          next-env.d.ts
        key: nextjs-build-${{ github.sha }}
        fail-on-cache-miss: true
